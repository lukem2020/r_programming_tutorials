# Copy this file to config/deploy.yml and fill in your shinyapps.io credentials.
# config/deploy.yml is gitignored — never commit tokens or secrets.
#
# Get credentials: https://www.shinyapps.io/ → Account → Tokens

shinyapps:
  account: "your-shinyapps-account"
  token: "PASTE_TOKEN"
  secret: "PASTE_SECRET"
  app_name: "xanomeline-tlg-teal"

deploy:
  # Which Shiny app to publish: teal (TLG Catalog) or legacy (MDR Safety Dashboard).
  app: teal

  # Run a smoke test before upload (recommended).
  smoke_test: true

  log_level: normal
  # Default true in deploy_app.R (non-interactive updates). Set false to block
  # overwriting an existing app name without confirmation.
  force_update: true

  # rsconnect 1.10+ uses renv.lock on the server when packageRepositoryResolutionR
  # is "lockfile" (set in deploy_app.R). Match renv.lock R version if needed.
  r_version: "4.6.0"

  # Optional: override bundled files (paths relative to app directory).
  # Leave null to use defaults for the selected app target.
  app_files: null

  # Default bundles when app_files is null:
  #
  # teal (project root; primary doc app.R is a deploy-time copy of app_teal/app.R):
  #   - app.R
  #   - app_teal/app.R
  #   - R/
  #   - config/study_config.yml
  #   - config/tlg_registry.yml
  #   - config/dataset_inventory.yml
  #   - data/adam/
  #   - renv.lock
  #   - .Rprofile
  #
  # legacy (project root app.R):
  #   - app.R, R/, config/study_config.yml, data/adam/, renv.lock, .Rprofile
