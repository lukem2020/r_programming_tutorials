# Study configuration - single source of truth for the MDR Safety Dashboard
# Standards: CDISC ADaM IG, FDA Standard Safety Tables and Figures (ST&F) Integrated Guide (Aug 2022),
# pharmaverse TLG Catalog (https://insightsengineering.github.io/tlg-catalog/stable/tlg-index.html)

study:
  id: CDISCPILOT01
  title: "A Phase III Study of Xanomeline in Alzheimer's Disease"
  drug: Xanomeline (transdermal patch)
  indication: Mild to moderate Alzheimer's disease
  phase: III
  fda_stf_version: "Integrated Guide, Version Date August 2022"
  tlg_catalog_ref: "https://insightsengineering.github.io/tlg-catalog/stable/tlg-index.html"
  arms:
    - Placebo
    - Xanomeline Low Dose
    - Xanomeline High Dose
  n_subjects_enrolled: 306
  n_subjects_safety: 254
  safety_population_flag: SAFFL
  exclude_arms: [Screen Failure]

datasets:
  ADSL:
    description: Subject-level analysis dataset - one row per subject
    path: data/adam/ADSL.rds
    grain: subject
    key_variables: [USUBJID, ARM, ARMCD, AGE, SEX, RACE, SAFFL, TRTSDT, TRTEDT, TRTDURD, EOSSTT]
    ctq_factor: Analysis population integrity / eligibility
    fda_stf_section: "General (Demographics, Disposition, Exposure)"

  ADAE:
    description: Adverse events - one row per event
    path: data/adam/ADAE.rds
    grain: event
    # AEBODSYS is the ADaM SOC variable; ASTDT/ASTDY for ordering; arm via ARM (no TRTA in ADAE)
    key_variables: [USUBJID, ARM, AEDECOD, AEBODSYS, AESEV, TRTEMFL, AESER, AEREL, ASTDT, ASTDY, AEOUT]
    ctq_factor: Safety reporting accuracy
    fda_stf_section: "Adverse Event Analyses"

  ADLB:
    description: Laboratory results - one row per test per visit
    path: data/adam/ADLB.rds
    grain: lab_visit
    key_variables: [USUBJID, ARM, PARAM, PARAMCD, LBCAT, AVAL, BASE, CHG, ANRIND, BNRIND, ANRLO, ANRHI, ABLFL, AVISIT, AVISITN, ADY]
    ctq_factor: Laboratory monitoring integrity
    fda_stf_section: "Laboratory Analyses"

  ADTTE:
    description: Time-to-event - one row per subject per TTE parameter (derived)
    path: data/adam/ADTTE.rds
    grain: subject_param
    derived_by: programs/02_derive_adtte.R
    key_variables: [USUBJID, ARM, PARAMCD, PARAM, AVAL, CNSR, STARTDT, EVNTDESC, CNSDTDSC]
    ctq_factor: Safety reporting accuracy (tolerability)
    fda_stf_section: "Adverse Event Analyses - time-to-event"

  ADEX:
    description: Exposure - one row per exposure record
    path: data/adam/ADEX.rds
    grain: exposure_record
    key_variables: [USUBJID, ARM, EXTRT, EXDOSE, EXDURD, EXROUTE, EXSTDY, EXENDY]
    ctq_factor: Analysis population integrity / exposure
    fda_stf_section: "General (Exposure)"

  ADVS:
    description: Vital signs - one row per test per visit
    path: data/adam/ADVS.rds
    grain: vs_visit
    key_variables: [USUBJID, ARM, PARAM, PARAMCD, AVAL, BASE, CHG, ABLFL, AVISIT, AVISITN]
    ctq_factor: Safety / vital signs monitoring
    fda_stf_section: "Vital Signs Analyses"

  ADCM:
    description: Concomitant medications - one row per medication record
    path: data/adam/ADCM.rds
    grain: cm_record
    key_variables: [USUBJID, ARM, CMTRT, CMDECOD, CMCLAS, ASTDY, AENDY, ONTRTFL, PREFL]
    ctq_factor: Safety reporting accuracy
    fda_stf_section: "Concomitant Medications"

  ADMH:
    description: Medical history - one row per history term
    path: data/adam/ADMH.rds
    grain: mh_record
    key_variables: [USUBJID, ARM, MHTERM, MHBODSYS, MHSTDY, MHOCCUR]
    ctq_factor: Traceability / patient context
    fda_stf_section: "Medical History (patient profile support)"

analysis_population:
  primary: "SAFFL == 'Y'"
  arms_for_safety: [Placebo, Xanomeline Low Dose, Xanomeline High Dose]
  join_key: USUBJID

# Section -> FDA ST&F + pharmaverse TLG catalog mapping (codes verified against the TLG index)
safety_review_sections:
  - id: S1
    title: Demographics and Baseline Characteristics
    fda_stf: General
    tlg_ref: DMT01
    dataset: ADSL
    shiny_tab: Demographics
  - id: S2
    title: Patient Disposition
    fda_stf: General
    tlg_ref: DST01
    dataset: ADSL
    shiny_tab: Demographics
  - id: S3
    title: Overview of Adverse Events (Safety Summary)
    fda_stf: Adverse Event Analyses
    tlg_ref: AET01
    dataset: ADAE
    shiny_tab: AE Overview
  - id: S4
    title: Serious Adverse Events
    fda_stf: Adverse Event Analyses - Serious Adverse Events
    tlg_ref: AET01 components + AEL03 listing
    dataset: ADAE
    shiny_tab: AE Overview
  - id: S5
    title: Treatment-Emergent AEs by SOC and PT
    fda_stf: Adverse Event Analyses - Treatment-Emergent Adverse Events
    tlg_ref: AET02
    dataset: ADAE
    shiny_tab: TEAE Table
  - id: S5b
    title: Treatment-Emergent AEs by SOC, PT and Severity
    fda_stf: Adverse Event Analyses - Treatment-Emergent Adverse Events
    tlg_ref: AET03
    dataset: ADAE
    shiny_tab: TEAE Table
  - id: S6
    title: Laboratory Central Tendency Over Time
    fda_stf: Laboratory Analyses - Change Over Time From Baseline
    tlg_ref: LBT01
    tlg_ref_graph: LTG01
    dataset: ADLB
    shiny_tab: Lab Trends
  - id: S7
    title: Laboratory Abnormalities / Shift
    fda_stf: Laboratory Analyses
    tlg_ref: LBT04
    dataset: ADLB
    shiny_tab: Lab Shifts
  - id: S8
    title: Hepatic Safety / Hy's Law (eDISH)
    fda_stf: Laboratory Analyses - DILI / Hy's Law
    tlg_ref: LBT09 / LBT10 / LBT11
    dataset: ADLB
    shiny_tab: Hy's Law
  - id: S9
    title: Patient Profile Drill-Down
    fda_stf: Adverse Event Analyses (narratives support)
    tlg_ref: IPPG01
    dataset: ADSL + ADAE + ADLB + ADVS + ADCM + ADMH
    shiny_tab: Patient Profile
  - id: S11
    title: Treatment Exposure
    fda_stf: General
    tlg_ref: EXSUM
    dataset: ADSL + ADEX
    shiny_tab: Demographics
  - id: S12
    title: Vital Signs Over Time
    fda_stf: Vital Signs Analyses
    tlg_ref: VST01
    dataset: ADVS
    shiny_tab: Vital Signs
  - id: S13
    title: Concomitant Medications
    fda_stf: Concomitant Medications
    tlg_ref: CM01
    dataset: ADCM
    shiny_tab: Concomitant Meds
  - id: S10
    title: Time to First Dermatologic Event (KM)
    fda_stf: Adverse Event Analyses - time-to-event
    tlg_ref: KMG01 + TTET01
    dataset: ADTTE
    shiny_tab: Time-to-Event
  - id: S14
    title: Safety Parameter Correlation
    fda_stf: Laboratory / Vital Signs exploratory
    tlg_ref: Custom (Spearman heatmap by arm)
    dataset: ADLB + ADVS
    shiny_tab: Correlation

# Liver chemistry parameters + Hy's Law thresholds (FDA: max post-baseline values)
hepatic_safety:
  hys_law:
    alt_param: "Alanine Aminotransferase (U/L)"
    ast_param: "Aspartate Aminotransferase (U/L)"
    bili_param: "Bilirubin (umol/L)"
    alt_threshold_x_uln: 3
    bili_threshold_x_uln: 2

# Time-to-event endpoints (programs/02_derive_adtte.R + Time-to-Event tab dropdown)
time_to_event_endpoints:
  - paramcd: TTDE
    label: "Dermatologic events"
    param: "Time to First Dermatologic Event (days)"
    event_label: "First dermatologic adverse event"
    event_decod_prefix: "APPLICATION SITE"
    event_soc: "SKIN AND SUBCUTANEOUS TISSUE DISORDERS"
    censor_label: "End of treatment (no dermatologic event)"
  - paramcd: TTCE
    label: "Cardiac events"
    param: "Time to First Cardiac Event (days)"
    event_label: "First cardiac adverse event"
    event_soc: "CARDIAC DISORDERS"
    censor_label: "End of treatment (no cardiac event)"

patient_profile:
  disposition_variable: EOSSTT
  completed_eosstt: COMPLETED
  # Excluded from Patient Profile lab table and panel plots (not hepatic/chem/hema/urine).
  exclude_lbcat:
    - OTHER

correlation_review:
  value_summary: max_post_baseline
  parameters:
    - "Alanine Aminotransferase (U/L)"
    - "Aspartate Aminotransferase (U/L)"
    - "Bilirubin (umol/L)"
    - "Creatinine (umol/L)"
    - "Hemoglobin (mmol/L)"
    - "Leukocytes (10^9/L)"
    - "Platelet (10^9/L)"
    - "Systolic Blood Pressure (mmHg)"
    - "Diastolic Blood Pressure (mmHg)"
    - "Pulse Rate (beats/min)"
    - "Weight (kg)"
    - "Mean Arterial Pressure (mmHg)"

cm_review:
  on_treatment_flag: ONTRTFL

display:
  arm_levels:
    - Placebo
    - Xanomeline Low Dose
    - Xanomeline High Dose
  arm_colors:
    Placebo: "#6c757d"
    Xanomeline Low Dose: "#4c9be8"
    Xanomeline High Dose: "#e8694c"
  top_n_ae: 10
  vs_params:
    - Systolic Blood Pressure (mmHg)
    - Diastolic Blood Pressure (mmHg)
    - Pulse Rate (beats/min)
    - Weight (kg)
  top_n_cm: 10
  # Lab Trends / Shifts / Patient Profile: all ADLB PARAMCD values are loaded
  # dynamically via lab_param_catalog() — grouped by LBCAT (~47 chemistry/hema/urine tests).

# teal Shiny app performance (programs/04_prepare_teal_adam.R + R/teal_adam_trim.R)
teal_app:
  optimize_datasets: true
  # null = use display.vs_params (drops ~40% of ADVS rows for VST01)
  advs_params: null
  # Baseline + Week N only (excludes unscheduled / post-baseline summary visits on line plots)
  scheduled_visit_pattern: "^Baseline$|^Week"
